---
- name: Create baseline Amazon Machine Image with preinstalled Chef
  hosts: local
  connection: local
  vars_files:
    - vars/AMI-Template-Baseline-Instance.var.yml

  roles:
    - ansible_cloudformation

  tasks:
    - name: Get stack name
      set_fact:
        stack_name: "{{ item.name }}"
      with_items: "{{ cloudformation_stacks }}"

    - name: Get current stack facts
      cloudformation_info:
        region: "{{ region }}"
        stack_name: "{{ stack_name }}"
        stack_resources: true
      register: opsworks_facts

    - name: Set new instance facts
      set_fact:
        InstanceId: "{{ opsworks_facts['cloudformation'][stack_name].stack_outputs['BaselineTemplateInstanceId'] }}"
        InstanceName: "{{ Environment }}-chef-preinstalled-image"

    - name: Wait for instance to stop itself
      shell: |
        STATUS=$(aws ec2 describe-instances --region {{ region }} --instance-ids {{ InstanceId }} --query "Reservations[].Instances[].State.Name" --output text) || return 1
        echo "Instance {{ InstanceId }} status: $STATUS" >&2
        for retry in `seq 1 6`; do
          if [ "$STATUS" = "pending" ]; then
            sleep 10
            $(aws ec2 describe-instances --region {{ region }} --instance-ids {{ InstanceId }} --query "Reservations[].Instances[].State.Name" --output text) || return 1
            echo "Instance {{ InstanceId }} status: $STATUS" >&2
          else
            break
          fi
        done
        if [ "$STATUS" != "stopped" ]; then
          echo "Expected {{ InstanceId }} to automatically stop, but instead had status $STATUS - aborting" >&2
          exit 2
        fi

    - name: Create new ami
      ec2_ami:
        instance_id: "{{ InstanceId }}"
        region: "{{ region }}"
        wait: yes
        name: "{{ InstanceName }}-from-{{ vanilla_ami }}"
        description: "Baseline AMI for CKAN instances, built from {{ vanilla_ami }} plus Chef"
        tags:
          Name: "{{ InstanceName }}-from-{{ vanilla_ami }}"
          Division: "{{ Division }}"
          Owner: "{{ Owner }}"
          Version: "{{ vanilla_ami }}"
      register: new_image

    - name: Record AMI ID
      shell: |
        aws ssm put-parameter --overwrite --type String --name "/config/CKAN/{{ Environment }}/common/BaselineAmiId" --value "{{ new_image.image_id }}"
